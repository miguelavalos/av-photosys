name: AVPhotosys
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    PRODUCT_NAME: AV Photosys
    SWIFT_VERSION: "6.0"

packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.0.0

schemes:
  AVPhotosys:
    build:
      targets:
        AVPhotosys: all
    run:
      config: Debug
      executable: AVPhotosys
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true

targets:
  AVPhotosys:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: AVPhotosys
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: AVPhotosys/App/AVPhotosys.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(AVALSYS_APPLE_DEVELOPMENT_TEAM)"
        INFOPLIST_FILE: AVPhotosys/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
